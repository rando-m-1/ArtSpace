<!DOCTYPE HTMl>
<html>
<head>
    <title>
        ArtSpace
    </title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js"></script>
</head>
<body>
    <header>
        <h1>
            <a href="index.html" class="a-nav"> Art Space </a>
        </h1>
        <div class="burger-menu" onclick="toggleMenu()">
            ☰
        </div>

        <nav id="mainNav" class="main-nav">
            <a href="catalog.html" class="a-nav">Каталог</a>
            <a href="blog.html" class="a-nav">Блог</a>
            <a href="contacts.html" class="a-nav">Контакты</a>
        </nav>
        <nav id="deckstopnav">
            <a href="catalog.html" class="a-nav">Каталог</a>
            <a href="blog.html" class="a-nav">Блог</a>
            <a href="contacts.html" class="a-nav">Контакты</a>
        </nav>
    </header>
    <section>
        <article>
            <div class="cart" onclick="toggleCart()">
                <p>🛒</p>
                <span class="cart__num" id="cartNum">0</span>
            </div>

            <div id="cartWindow" class="cart-window">
                <h3>Корзина</h3>
                <ul id="cartItems"></ul>
                <p>Итого: <span id="totalPrice">0</span> ₽</p>
            </div>
            <div id="room">
                <div class="wall-background" id="wallBackground"></div>

                <div class="product-img">
                    <img src="https://spb.rakovgallery.ru/media/Catalog/Product/2025-03-03/preview_XL_webp_d5d3497fa93322b5f8b17a791d5ab765.webp" alt="Город у моря" />
                </div>

                <div class="product-info">
                    <center>
                        <h1> Город у моря </h1>
                        <h2> Александр Бояджан </h2>
                        <p> Масло, Холст, 60 x 80 см</p>
                        <div class="wallColorpicker">
                            <label for="wallColor">
                                <button onclick="applyWallColor()" id="colorbutton">Примерить на стену</button>
                                <input type="color" id="wallColor" value="#FFFFFF">
                            </label>
                        </div>
                        <button class="card__add" onclick="addToCart('Город у моря', 150000)" style="margin-top:100px;"> В корзину</button>
                        <div class="wall-color-picker">
                        </div>
                    </center>
                </div>
                <br />
            </div>
        </article>
    </section>
    <footer class="site-footer">
        <p align="left"> Копирайт (© 2026 ArtSpace. Учебный проект, Буянкина Татьяна Валерьевна) </p>
        <div class="footer-container">
            <ul class="footer-nav">
                <li><a href="index.html">Главная</a></li>
                <li><a href="catalog.html">Каталог</a></li>
                <li><a href="blog.html">Блог</a></li>
                <li><a href="contacts.html">Контакты</a></li>
            </ul>

            <ul class="footer-contacts">
                <li> <a href=""> <img src="vk.png" style="width:5%" /> </a></li>
                <li> <a href=""> <img src="youtube.png" style="width:5%" /> </a></li>
            </ul>
        </div>
    </footer>
</body>
</html>
